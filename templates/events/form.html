{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Create Relief Event - Aid Distribution Tracker System (Relief Goods){% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-md-12">
            <h2 class="fw-bold text-dark">Create Relief Event</h2>
            <p class="text-muted">Setup a new disaster response operation</p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="glass-card p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-4 text-end">
                        <a href="{% url 'events:list' %}" class="btn btn-outline-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary-glass">Initialize Event</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
